services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: khata-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: khata_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khata_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - khata-network

  # Redis (for caching & session management)
  redis:
    image: redis:7-alpine
    container_name: khata-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - khata-network

  # Next.js Application (Development)
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: khata-app-dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:admin@postgres:5432/khata_db
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: khata-secret-key-change-in-production
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - khata-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  khata-network:
    driver: bridge
